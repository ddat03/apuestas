# fly.toml — Configuración para Fly.io
# Bot de Telegram: proceso worker sin HTTP

app            = "apuestas-bot-tg"
primary_region = "gru"   # São Paulo — más cercano a Colombia en Fly.io

[build]

[env]
  PYTHONUNBUFFERED = "1"

# Sin [http_service] — este proceso no sirve tráfico HTTP
# Solo corre el bot de Telegram en modo polling

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1
